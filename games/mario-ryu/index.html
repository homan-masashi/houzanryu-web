<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>天斗マリオ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  touch-action:none;
}
#game-area {
  display:flex;
  flex-direction:column;
  align-items:center;
  transform-origin:top center;
}
canvas {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
#touch-controls {
  display:flex;
  justify-content:space-between;
  width:100%;
  padding:8px 12px 4px;
  background:rgba(0,0,0,0.4);
}
.touch-group { display:flex; gap:10px; }
.touch-btn {
  width:60px; height:60px;
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.5);
  border-radius:50%;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.touch-btn:active, .touch-btn.pressed {
  background:rgba(255,255,255,0.5);
  transform:scale(0.92);
}
#overlay {
  position:absolute;
  top:0; left:0; right:0;
  height:320px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.78);
  gap:18px;
  z-index:10;
}
#overlay.hidden { display:none; }
#overlay h1 {
  font-size:26px;
  color:#FFD700;
  text-shadow:3px 3px 0 #8B0000;
  letter-spacing:3px;
  text-align:center;
  line-height:1.6;
  font-family:'Courier New',monospace;
  font-weight:900;
}
#overlay .sub {
  font-size:11px;
  color:#ddd;
  text-align:center;
  line-height:2;
  font-family:'Courier New',monospace;
}
.start-btn {
  padding:13px 40px;
  font-size:14px;
  font-family:'Courier New',monospace;
  font-weight:900;
  border:3px solid #FFD700;
  border-radius:6px;
  cursor:pointer;
  letter-spacing:2px;
  background:#E52521;
  color:#fff;
  -webkit-tap-highlight-color:transparent;
}
#wrapper {
  position:relative;
  width:480px;
  height:320px;
}
</style>
</head>
<body>
<div id="game-area">
  <div id="wrapper">
    <canvas id="c" width="480" height="320"></canvas>
    <div id="overlay">
      <h1>天斗マリオ</h1>
      <div class="sub">← → : 移動 &nbsp; ↑ / Z : ジャンプ<br>スマホ: 下のボタンで操作</div>
      <button class="start-btn" id="startBtn">▶ START</button>
    </div>
  </div>
  <div id="touch-controls">
    <div class="touch-group">
      <div class="touch-btn" id="btn-left">◀</div>
      <div class="touch-btn" id="btn-right">▶</div>
    </div>
    <div class="touch-group">
      <div class="touch-btn" id="btn-jump">▲</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 320;
const TILE = 16;

// Scale to viewport
(function scaleGame() {
  const ga = document.getElementById('game-area');
  function resize() {
    const ctrlH = 80;
    const s = Math.min(window.innerWidth / W, (window.innerHeight - 0) / (H + ctrlH));
    ga.style.transform = `scale(${s})`;
    ga.style.marginTop = ((window.innerHeight - (H + ctrlH) * s) / 2) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
})();

// Face image
const faceImg = new Image();
faceImg.src = 'face.jpg';

// Colors
const C = {
  sky:'#5C94FC', ground:'#C84B0F', groundTop:'#E89F59',
  pipe:'#00A800', pipeDark:'#006D00', pipeTop:'#00D800',
  brick:'#C84B0F', brickLine:'#A83B00',
  question:'#E8A800', questionDark:'#B87800',
  coin:'#FFD700', cloud:'#fff', bush:'#00A800',
  hatRed:'#E52521', skin:'#C8834C', skinDark:'#A0623A',
  overalls:'#1A5276', shirt:'#E52521',
  shoe:'#6B3D1E', hair:'#6B3D1E', mustache:'#5C2A00',
  goomba:'#C8834C', goombaDark:'#8B5A2B',
  koopa:'#8B9B2B', koopaDark:'#5A6B1A',
};

const LEVEL_W = 6400;
const GRAVITY = 0.45;
const JUMP_VY = -9.5;
const MOVE_SPEED = 2.8;

// ── Level ──────────────────────────────────────────────────────
function makeLevel() {
  // Ground as wide segments (not individual tiles) for fast collision
  const grounds = [];
  // Segment 1: 0 to 1791
  grounds.push({ x:0,    y:H-32, w:1792, h:32 });
  // Segment 2: 1920 to 3199
  grounds.push({ x:1920, y:H-32, w:1280, h:32 });
  // Segment 3: 3328 to end
  grounds.push({ x:3328, y:H-32, w:LEVEL_W-3328, h:32 });

  // Floating blocks
  const blocks = [
    // [x, y, w, type]  w in tiles
    [208,H-80, 3,'brick'],
    [352,H-96, 1,'question'],[368,H-96,1,'brick'],[384,H-96,1,'question'],
    [400,H-96, 1,'brick'],[416,H-96,1,'question'],
    [352,H-144,1,'brick'],
    [512,H-96, 2,'brick'],
    [576,H-144,4,'brick'],
    [704,H-96, 1,'question'],
    [768,H-96, 3,'brick'],[832,H-96,1,'question'],
    [1024,H-80,4,'brick'],
    [1120,H-128,5,'brick'],
    [1232,H-80,1,'question'],
    [1280,H-80,4,'brick'],
    [1472,H-96,3,'brick'],
    [1600,H-96,1,'question'],[1616,H-96,1,'brick'],[1632,H-96,1,'question'],
    [2048,H-80,1,'question'],[2080,H-80,1,'brick'],
    [2304,H-96,5,'brick'],
    [2432,H-96,1,'question'],
    [2560,H-128,4,'brick'],
    [2720,H-80,2,'brick'],
    [2880,H-112,1,'question'],
    [3072,H-80,3,'brick'],
    [3456,H-96,2,'question'],
    [3584,H-80,4,'brick'],
    [3840,H-96,3,'brick'],
    [4096,H-128,5,'question'],
    [4352,H-96,3,'brick'],
    [4608,H-80,1,'question'],
    [4800,H-96,4,'brick'],
    [5120,H-80,2,'brick'],
    [5376,H-112,3,'question'],
    [5632,H-96,2,'brick'],
  ];

  const platforms = [];
  const questions = [];

  blocks.forEach(([bx, by, bw, type]) => {
    if (type === 'brick') {
      platforms.push({ x:bx, y:by, w:bw*TILE, h:TILE, type:'brick' });
    } else {
      // each question is individual (for hit tracking)
      for (let i = 0; i < bw; i++) {
        const qx = bx + i*TILE;
        platforms.push({ x:qx, y:by, w:TILE, h:TILE, type:'question', idx:questions.length });
        questions.push({ x:qx, y:by, active:true });
      }
    }
  });

  // Stairs at end
  for (let s = 0; s < 8; s++) {
    platforms.push({ x:5888+s*TILE, y:H-32-s*TILE, w:TILE, h:32+s*TILE, type:'brick' });
  }

  // Pipes
  const pipes = [];
  [[384,2],[608,3],[800,4],[1024,3],[2048,2],[2304,4],[2560,2],[3200,3],
   [3584,2],[4096,3],[4480,2],[5120,3],[5504,4],[5760,2]
  ].forEach(([px,ph]) => {
    pipes.push({ x:px, y:H-32-ph*TILE, w:TILE*2, h:ph*TILE });
  });

  // Coins
  const coins = [];
  [[256,H-112,5],[448,H-128,3],[704,H-112,3],[1056,H-96,3],
   [1472,H-112,4],[2064,H-96,2],[2464,H-112,3],[2880,H-128,2],
   [3072,H-96,4],[3584,H-96,3],[4112,H-144,5],[4608,H-96,2],
   [5132,H-96,3],[5392,H-128,4]
  ].forEach(([cx,cy,cc]) => {
    for (let i = 0; i < cc; i++)
      coins.push({ x:cx+i*TILE+4, y:cy, collected:false, t:i*8 });
  });

  // Enemies
  const enemies = [];
  [[400,'g'],[528,'g'],[672,'g'],[900,'k'],[1056,'g'],[1280,'g'],
   [1408,'k'],[1568,'g'],[2112,'g'],[2176,'g'],[2368,'k'],
   [2656,'g'],[2816,'g'],[3072,'k'],[3200,'g'],[3456,'g'],
   [3712,'k'],[3840,'g'],[4224,'g'],[4352,'k'],[4480,'g'],
   [4736,'g'],[4992,'k'],[5248,'g'],[5376,'g'],[5504,'k']
  ].forEach(([ex,et]) => {
    enemies.push({ x:ex, y:H-32-TILE, vx:et==='k'?-1.2:-1, vy:0,
      type:et==='k'?'koopa':'goomba', alive:true,
      squished:false, squishT:0, onGround:false });
  });

  // All solids for collision (grounds + platforms + pipes as flat list)
  const allSolids = [
    ...grounds,
    ...platforms,
    ...pipes.map(p => ({ ...p, type:'pipe' })),
  ];

  return { grounds, platforms, pipes, questions, coins, enemies, allSolids,
           flag:{ x:6176, y:H-32-TILE*10, h:TILE*10 } };
}

// ── Spatial filter ─────────────────────────────────────────────
function nearSolids(solids, ox, margin=80) {
  return solids.filter(s => s.x < ox + margin && s.x + s.w > ox - margin);
}

// ── State ──────────────────────────────────────────────────────
let state = 'title';
let scrollX = 0, score = 0, lives = 3, coinCount = 0;
let level, player;
const coinPops = [], scoreFloats = [];

function makePlayer() {
  return { x:48, y:H-64, w:16, h:26, vx:0, vy:0,
           onGround:false, facing:1,
           animFrame:0, animT:0,
           invincible:0, dead:false, deadT:0 };
}

// ── Input ──────────────────────────────────────────────────────
const keys = { left:false, right:false, jump:false };
let jumpHeld = false;

document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  keys.left  = true;
  if (e.key==='ArrowRight') keys.right = true;
  if ((e.key==='ArrowUp'||e.key==='z'||e.key==='Z'||e.key===' ') && !jumpHeld) {
    keys.jump = true; jumpHeld = true;
  }
  e.preventDefault && (e.key!=='F5') && e.preventDefault();
}, { passive:false });
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft')  keys.left  = false;
  if (e.key==='ArrowRight') keys.right = false;
  if (e.key==='ArrowUp'||e.key==='z'||e.key==='Z'||e.key===' ') {
    keys.jump = false; jumpHeld = false;
  }
});

function bindBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = () => { keys[key] = true;  if (key==='jump') jumpHeld=false; };
  const off = () => { keys[key] = false; if (key==='jump') jumpHeld=false; };
  el.addEventListener('touchstart', e => { e.preventDefault(); on();  }, { passive:false });
  el.addEventListener('touchend',   e => { e.preventDefault(); off(); }, { passive:false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); off(); }, { passive:false });
  el.addEventListener('mousedown',  e => { e.preventDefault(); on();  });
  el.addEventListener('mouseup',    e => { e.preventDefault(); off(); });
  el.addEventListener('mouseleave', e => { off(); });
}
bindBtn('btn-left',  'left');
bindBtn('btn-right', 'right');
bindBtn('btn-jump',  'jump');

// ── Collision ──────────────────────────────────────────────────
function overlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function moveAndCollide(obj, solids) {
  obj.onGround = false;
  const near = nearSolids(solids, obj.x, obj.w + 80);

  obj.x += obj.vx;
  for (const s of near) {
    if (!overlap(obj.x,obj.y,obj.w,obj.h, s.x,s.y,s.w,s.h)) continue;
    if (obj.vx > 0) obj.x = s.x - obj.w;
    else if (obj.vx < 0) obj.x = s.x + s.w;
    obj.vx = 0;
  }

  obj.y += obj.vy;
  for (const s of near) {
    if (!overlap(obj.x,obj.y,obj.w,obj.h, s.x,s.y,s.w,s.h)) continue;
    if (obj.vy > 0) {
      obj.y = s.y - obj.h; obj.vy = 0; obj.onGround = true;
    } else if (obj.vy < 0) {
      obj.y = s.y + s.h; obj.vy = 0;
      if (s.type === 'question') hitQuestion(s.idx);
    }
  }
}

function hitQuestion(idx) {
  if (idx == null) return;
  const q = level.questions[idx];
  if (!q || !q.active) return;
  q.active = false;
  coinPops.push({ x:q.x+4, y:q.y-TILE, vy:-5, life:40 });
  coinCount++; score += 200;
  scoreFloats.push({ x:q.x, y:q.y-8, txt:'200', life:60 });
}

// ── Update ──────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  const p = player;

  if (p.dead) {
    p.deadT--;
    p.vy = Math.min(p.vy + GRAVITY, 12);
    p.y += p.vy;
    if (p.deadT <= 0) {
      lives--;
      if (lives <= 0) { state='over'; showOverlay('GAME OVER','もう一度プレイ',startGame); }
      else resetPlayer();
    }
    return;
  }

  // Movement
  if (keys.left)       { p.vx = -MOVE_SPEED; p.facing = -1; }
  else if (keys.right) { p.vx =  MOVE_SPEED; p.facing =  1; }
  else p.vx *= 0.72;

  if (keys.jump && p.onGround) {
    p.vy = JUMP_VY;
    p.onGround = false;
    keys.jump = false;
    jumpHeld = true;
  }

  p.vy = Math.min(p.vy + GRAVITY, 12);
  moveAndCollide(p, level.allSolids);

  // Left boundary
  if (p.x < scrollX) p.x = scrollX;
  // Fall pit
  if (p.y > H + 40) { killPlayer(); return; }

  // Scroll camera
  const mid = scrollX + W * 0.4;
  if (p.x > mid) scrollX = Math.min(p.x - W*0.4, LEVEL_W - W);

  // Coins
  for (const c of level.coins) {
    if (c.collected) { c.t++; continue; }
    if (overlap(p.x,p.y,p.w,p.h, c.x-4,c.y-4,TILE-2,TILE-2)) {
      c.collected = true; coinCount++; score += 100;
      scoreFloats.push({ x:c.x, y:c.y, txt:'+100', life:50 });
    }
    c.t++;
  }

  // Enemies
  const sol = level.allSolids;
  for (const e of level.enemies) {
    if (!e.alive) continue;
    if (e.squished) { if (--e.squishT <= 0) e.alive = false; continue; }

    e.vy = Math.min(e.vy + GRAVITY, 12);
    e.x += e.vx;
    e.y += e.vy;

    const enear = nearSolids(sol, e.x, TILE + 40);
    e.onGround = false;
    for (const s of enear) {
      if (!overlap(e.x,e.y,TILE-2,TILE-2, s.x,s.y,s.w,s.h)) continue;
      if (e.vy > 0) { e.y = s.y-(TILE-2); e.vy=0; e.onGround=true; }
      else if (e.vy < 0) { e.y = s.y+s.h; e.vy=0; }
      else { e.vx = -e.vx; }
    }
    // Cliff turn
    if (e.onGround) {
      const checkX = e.x + (e.vx>0 ? TILE : -2);
      let hasFloor = false;
      for (const s of enear) {
        if (s.y >= e.y+(TILE-2)-2 && checkX >= s.x && checkX <= s.x+s.w) { hasFloor=true; break; }
      }
      if (!hasFloor) e.vx = -e.vx;
    }
    if (e.y > H+40) { e.alive=false; continue; }

    // Player collision
    if (p.invincible>0 || !overlap(p.x,p.y,p.w,p.h, e.x,e.y,TILE-2,TILE-2)) continue;
    if (p.vy>0 && p.y+p.h < e.y+(TILE*0.65)) {
      e.squished=true; e.squishT=28; p.vy=-5;
      score+=100; scoreFloats.push({ x:e.x, y:e.y, txt:'100', life:50 });
    } else {
      killPlayer(); return;
    }
  }

  // Goal
  const f = level.flag;
  if (overlap(p.x,p.y,p.w,p.h, f.x,f.y,8,f.h+32)) {
    state='win'; score+=5000;
    showOverlay('ステージクリア！','もう一度プレイ',startGame);
  }

  // Coin pops
  for (const cp of coinPops) { cp.y+=cp.vy; cp.vy+=0.4; cp.life--; }
  coinPops.splice(0, coinPops.length, ...coinPops.filter(c=>c.life>0));

  // Score floats
  for (const sf of scoreFloats) { sf.y-=0.7; sf.life--; }
  scoreFloats.splice(0, scoreFloats.length, ...scoreFloats.filter(s=>s.life>0));

  // Walk animation
  if (Math.abs(p.vx)>0.3) {
    if (++p.animT > 7) { p.animT=0; p.animFrame=(p.animFrame+1)%3; }
  } else { p.animFrame=0; p.animT=0; }

  if (p.invincible>0) p.invincible--;
}

function killPlayer() {
  const p = player;
  if (p.dead) return;
  p.dead=true; p.deadT=110; p.vy=-7.5; p.vx=0;
  p.invincible=110;
}
function resetPlayer() { player=makePlayer(); scrollX=0; }

// ── Draw ────────────────────────────────────────────────────────
function sx(wx) { return wx - scrollX; }

function draw() {
  // Sky
  ctx.fillStyle = C.sky;
  ctx.fillRect(0,0,W,H);

  drawClouds();
  drawBushes();
  drawPipes();
  drawPlatforms();
  drawCoins();
  drawCoinPops();
  drawEnemies();
  drawFlag();
  if (state==='playing'||state==='win') drawPlayer();
  drawScoreFloats();
  drawHUD();
}

function drawClouds() {
  ctx.fillStyle = C.cloud;
  [[100,38],[380,50],[660,32],[940,46],[1210,38],[1590,43],
   [2010,36],[2420,50],[2830,40],[3250,34],[3640,46],[4020,38],
   [4410,52],[4830,36],[5220,44],[5610,40]
  ].forEach(([wx,wy]) => {
    const x = ((sx(wx) % W) + W) % W;
    cloud(x,wy); if(x<64) cloud(x+W,wy);
  });
}
function cloud(x,y) {
  ctx.fillRect(x+16,y,32,16); ctx.fillRect(x,y+8,64,16);
  ctx.fillRect(x+8,y-8,24,16); ctx.fillRect(x+32,y-4,20,12);
}
function drawBushes() {
  [320,832,1344,1856,2368,2880,3392,3904,4416,4928,5440].forEach(bx => {
    const x=sx(bx), y=H-32-8;
    ctx.fillStyle=C.bush;
    ctx.fillRect(x,y+4,32,12); ctx.fillRect(x+4,y,24,8); ctx.fillRect(x+8,y-4,16,8);
    ctx.fillStyle='#00C800'; ctx.fillRect(x+8,y-4,8,4); ctx.fillRect(x+12,y,8,4);
  });
}

function drawPlatforms() {
  for (const p of level.platforms) {
    const x=sx(p.x);
    if (x>W+4||x<-p.w-4) continue;
    if (p.type==='brick') drawBrick(x,p.y,p.w,p.h);
    else if (p.type==='question') {
      const q=level.questions[p.idx];
      drawQuestion(x,p.y,q?q.active:false);
    }
  }
  // Ground segments
  for (const g of level.grounds) {
    const x=sx(g.x);
    if (x>W+4||x<-g.w-4) continue;
    ctx.fillStyle=C.ground; ctx.fillRect(x,g.y,g.w,g.h);
    ctx.fillStyle=C.groundTop; ctx.fillRect(x,g.y,g.w,4);
  }
  // Stairs drawn via platforms (bricks)
}

function drawBrick(x,y,w,h) {
  ctx.fillStyle=C.brick; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=C.brickLine;
  for (let tx=0;tx<w;tx+=TILE) {
    ctx.fillRect(x+tx,y+5,TILE,1); ctx.fillRect(x+tx,y+11,TILE,1);
    ctx.fillRect(x+tx+4,y,1,5); ctx.fillRect(x+tx+12,y+6,1,5);
  }
}
function drawQuestion(x,y,active) {
  ctx.fillStyle=active?C.question:'#808080';
  ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=active?C.questionDark:'#505050';
  ctx.fillRect(x,y+TILE-2,TILE,2); ctx.fillRect(x+TILE-2,y,2,TILE);
  ctx.fillStyle='#fff'; ctx.font='bold 9px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(active?'?':'★',x+8,y+8.5);
}

function drawPipes() {
  for (const p of level.pipes) {
    const x=sx(p.x);
    if (x>W+4||x<-p.w-4) continue;
    ctx.fillStyle=C.pipe; ctx.fillRect(x+2,p.y,p.w-4,p.h);
    ctx.fillStyle=C.pipeDark; ctx.fillRect(x+p.w-4,p.y,3,p.h);
    ctx.fillStyle=C.pipeTop; ctx.fillRect(x,p.y,p.w,TILE);
    ctx.fillStyle=C.pipe; ctx.fillRect(x+2,p.y+2,p.w-4,TILE-4);
    ctx.fillStyle=C.pipeDark; ctx.fillRect(x+p.w-3,p.y+2,3,TILE-4);
  }
}

function drawCoins() {
  const t = Date.now();
  for (const c of level.coins) {
    if (c.collected) continue;
    const x=sx(c.x); if(x<-8||x>W+8) continue;
    drawCoin(x, c.y + Math.sin(c.t*0.13)*2, t);
  }
}
function drawCoin(x,y,t) {
  const w=[8,5,2,5][Math.floor((t||Date.now())/110)%4];
  ctx.fillStyle=C.coin; ctx.fillRect(x+(8-w)/2,y,w,12);
  ctx.fillStyle='#FFF080'; ctx.fillRect(x+(8-w)/2,y+2,Math.max(w-2,1),2);
}
function drawCoinPops() {
  const t=Date.now();
  for (const cp of coinPops) drawCoin(sx(cp.x),cp.y,t);
}

function drawEnemies() {
  for (const e of level.enemies) {
    if (!e.alive) continue;
    const x=sx(e.x); if(x<-TILE||x>W+TILE) continue;
    if (e.type==='goomba') drawGoomba(x,e.y,e.squished);
    else drawKoopa(x,e.y,e.squished);
  }
}
function drawGoomba(x,y,sq) {
  if (sq) {
    ctx.fillStyle=C.goomba; ctx.fillRect(x,y+8,TILE-2,6);
    ctx.fillStyle='#fff'; ctx.fillRect(x+2,y+9,3,3); ctx.fillRect(x+9,y+9,3,3);
    return;
  }
  ctx.fillStyle=C.goombaDark; ctx.fillRect(x,y+11,5,3); ctx.fillRect(x+8,y+11,5,3);
  ctx.fillStyle=C.goomba; ctx.fillRect(x+1,y+4,12,10); ctx.fillRect(x+2,y,10,8);
  ctx.fillStyle='#fff'; ctx.fillRect(x+3,y+2,3,3); ctx.fillRect(x+8,y+2,3,3);
  ctx.fillStyle='#000'; ctx.fillRect(x+4,y+3,2,2); ctx.fillRect(x+9,y+3,2,2);
  ctx.fillRect(x+2,y+1,4,1); ctx.fillRect(x+8,y+1,4,1);
}
function drawKoopa(x,y,sq) {
  if (sq) {
    ctx.fillStyle=C.koopa; ctx.fillRect(x,y+6,TILE,8);
    ctx.fillStyle=C.koopaDark; ctx.fillRect(x+2,y+8,TILE-4,4); return;
  }
  ctx.fillStyle='#FFC080'; ctx.fillRect(x,y+12,5,3); ctx.fillRect(x+9,y+12,5,3);
  ctx.fillStyle=C.koopa; ctx.fillRect(x+1,y+4,12,10);
  ctx.fillStyle=C.koopaDark; ctx.fillRect(x+3,y+6,8,6);
  ctx.fillStyle='#FFC080'; ctx.fillRect(x+3,y,9,7);
  ctx.fillStyle='#fff'; ctx.fillRect(x+7,y+1,4,3);
  ctx.fillStyle='#000'; ctx.fillRect(x+9,y+2,2,2);
}

function drawFlag() {
  const f=level.flag; const x=sx(f.x);
  if (x<-10||x>W+10) return;
  ctx.fillStyle='#888'; ctx.fillRect(x+3,f.y,2,f.h+32);
  ctx.fillStyle='#E52521';
  const wv=Math.sin(Date.now()*0.005)*3;
  ctx.beginPath(); ctx.moveTo(x+5,f.y);
  ctx.lineTo(x+20+wv,f.y+8); ctx.lineTo(x+5,f.y+16); ctx.fill();
  ctx.fillStyle='#C0C0C0'; ctx.fillRect(x-20,f.y+f.h+16,48,32);
  ctx.fillStyle='#8B0000'; ctx.fillRect(x-8,f.y+f.h+22,16,26);
}

function drawPlayer() {
  const p=player;
  if (p.invincible>0 && Math.floor(p.invincible/3)%2===0) return;
  const x=sx(p.x), y=p.y;
  ctx.save();
  if (p.facing<0) { ctx.translate(x+p.w,0); ctx.scale(-1,1); drawChar(0,y,p.animFrame,!p.onGround,p.dead); }
  else drawChar(x,y,p.animFrame,!p.onGround,p.dead);
  ctx.restore();
}

function drawChar(x,y,frame,jumping,dead) {
  if (dead) {
    drawBody(x,y+6,0);
    drawHead(x,y);
    ctx.fillStyle=C.shirt;
    ctx.fillRect(x-4,y+8,4,8); ctx.fillRect(x+16,y+8,4,8);
    ctx.fillStyle='#fff';
    ctx.fillRect(x-5,y+5,5,5); ctx.fillRect(x+16,y+5,5,5);
    return;
  }
  drawBody(x,y+6,frame);
  drawHead(x,y);
  if (jumping) {
    ctx.fillStyle=C.shirt;
    ctx.fillRect(x-4,y+7,4,6); ctx.fillRect(x+16,y+7,4,6);
    ctx.fillStyle='#fff';
    ctx.fillRect(x-5,y+4,5,5); ctx.fillRect(x+16,y+4,5,5);
  } else {
    ctx.fillStyle=C.shirt;
    ctx.fillRect(x-2,y+9,3,7); ctx.fillRect(x+15,y+9,3,7);
    ctx.fillStyle='#fff';
    ctx.fillRect(x-3,y+14,4,5); ctx.fillRect(x+15,y+14,4,5);
  }
}

function drawHead(x,y) {
  // Hat
  ctx.fillStyle=C.hatRed;
  ctx.fillRect(x-1,y+4,18,2);
  ctx.fillRect(x+1,y+1,14,4);
  ctx.fillRect(x+3,y,10,3);
  // M badge
  ctx.fillStyle='#fff'; ctx.fillRect(x+5,y+1,6,3);
  ctx.fillStyle=C.hatRed;
  ctx.font='bold 5px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('M',x+8,y+2.5);

  // Face (skin)
  ctx.fillStyle=C.skin;
  ctx.fillRect(x+2,y+6,12,9);

  // Ponytail
  ctx.fillStyle=C.hair;
  ctx.fillRect(x+12,y+5,6,3); ctx.fillRect(x+14,y+8,5,2); ctx.fillRect(x+15,y+10,4,2);

  // Eyes
  ctx.fillStyle='#000';
  ctx.fillRect(x+4,y+8,2,2); ctx.fillRect(x+9,y+8,2,2);
  ctx.fillStyle='#fff';
  ctx.fillRect(x+4,y+8,1,1); ctx.fillRect(x+9,y+8,1,1);

  // Mustache
  ctx.fillStyle=C.mustache;
  ctx.fillRect(x+3,y+11,10,2); ctx.fillRect(x+5,y+13,6,1);

  // Nose
  ctx.fillStyle=C.skinDark;
  ctx.fillRect(x+7,y+9,3,2);

  // Photo overlay
  if (faceImg.complete && faceImg.naturalWidth>0) {
    ctx.save();
    ctx.globalAlpha=0.88;
    ctx.beginPath(); ctx.rect(x+2,y+6,12,9); ctx.clip();
    ctx.drawImage(faceImg, 480,180,950,850, x+2,y+6,12,9);
    ctx.restore();
  }
}

function drawBody(x,y,frame) {
  ctx.fillStyle=C.overalls; ctx.fillRect(x+2,y,12,12);
  ctx.fillStyle=C.shirt; ctx.fillRect(x,y,2,8); ctx.fillRect(x+14,y,2,8);
  ctx.fillStyle='#FFD700'; ctx.fillRect(x+5,y+1,2,2); ctx.fillRect(x+9,y+1,2,2);

  const lo = frame===1?2:frame===2?-1:0;
  ctx.fillStyle=C.overalls;
  ctx.fillRect(x+2, y+12, 5, 6+(lo>0?lo:0));
  ctx.fillStyle=C.shoe;
  ctx.fillRect(x+1, y+17+(lo>0?lo:0), 7, 3);

  ctx.fillStyle=C.overalls;
  ctx.fillRect(x+9, y+12, 5, 6+(lo<0?-lo:0));
  ctx.fillStyle=C.shoe;
  ctx.fillRect(x+8, y+17+(lo<0?-lo:0), 7, 3);
}

function drawScoreFloats() {
  for (const sf of scoreFloats) {
    ctx.globalAlpha=Math.min(1,sf.life/20);
    ctx.font='bold 8px monospace'; ctx.fillStyle='#FFD700';
    ctx.textAlign='center'; ctx.fillText(sf.txt,sx(sf.x)+4,sf.y);
  }
  ctx.globalAlpha=1;
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,22);
  ctx.font='bold 8px monospace';
  ctx.textBaseline='middle';
  ctx.fillStyle='#FFD700'; ctx.textAlign='left';
  ctx.fillText('天斗',6,11);
  ctx.fillStyle='#fff'; ctx.fillText(`×${lives}`,26,11);
  ctx.fillStyle='#aaa'; ctx.fillText('SCORE',120,7);
  ctx.fillStyle='#FFD700'; ctx.fillText(String(score).padStart(7,'0'),115,16);
  ctx.fillStyle='#FFD700'; ctx.fillText(`コイン ×${String(coinCount).padStart(2,'0')}`,260,11);
  ctx.fillStyle='#fff'; ctx.fillText('WORLD 1-1',375,11);
}

// ── Overlay ─────────────────────────────────────────────────────
function showOverlay(title,btnTxt,cb) {
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent=title;
  const btn=ov.querySelector('.start-btn');
  btn.textContent=btnTxt; btn.onclick=cb;
  ov.classList.remove('hidden');
}
function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

// ── Game flow ────────────────────────────────────────────────────
function startGame() {
  level=makeLevel(); player=makePlayer();
  scrollX=0; score=0; coinCount=0; lives=3;
  coinPops.length=0; scoreFloats.length=0;
  state='playing'; hideOverlay();
}
document.getElementById('startBtn').onclick=startGame;

// タイトル画面でもゲーム世界を表示するため事前初期化
level=makeLevel(); player=makePlayer();

// ── Loop ─────────────────────────────────────────────────────────
function loop() {
  try { update(); draw(); } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
