<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穰楓マリオ - QRコード</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a1628;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  gap:28px; padding:32px;
}
h1 { color:#FFD700; font-size:28px; font-weight:900; letter-spacing:4px; text-shadow:0 0 20px #E52521; }
.card {
  background:#fff;
  border-radius:24px;
  padding:24px;
  box-shadow:0 0 40px rgba(229,37,33,0.6);
}
.url {
  color:#aaa;
  font-size:13px;
  word-break:break-all;
  text-align:center;
  max-width:320px;
}
.btn {
  padding:14px 44px;
  font-size:18px; font-weight:700;
  border:none; border-radius:50px; cursor:pointer;
  background:linear-gradient(135deg,#E52521,#C8840F);
  color:#fff;
  box-shadow:0 0 24px rgba(229,37,33,0.6);
  text-decoration:none;
}
p { color:#FFD700; font-size:14px; text-align:center; }
</style>
</head>
<body>
<h1>穰楓マリオ</h1>
<div class="card">
  <div id="qr"></div>
</div>
<p>スキャンして遊ぼう！</p>
<div class="url" id="gameUrl"></div>
<a class="btn" id="playBtn" href="#">今すぐプレイ</a>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  var url = 'https://homan-masashi.github.io/houzanryu-web/games/mario-ryu/';
  document.getElementById('gameUrl').textContent = url;
  document.getElementById('playBtn').href = url;
  new QRCode(document.getElementById('qr'), {
    text: url,
    width: 256,
    height: 256,
    colorDark: '#0a1628',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
